    <title>KCA 바리스타 포털 | 회원가입</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <main-header active="info"></main-header>

    <main class="container">
        <section class="section">
            <div class="login-container">
                <h1>회원가입</h1>
                <p>KCA 바리스타 포털의 회원이 되어 다양한 혜택을 누리세요.</p>
                <form id="register-form">
                    <div class="form-group">
                        <label>이름</label>
                        <input type="text" id="reg-name" required placeholder="실명을 입력하세요">
                    </div>
                    <div class="form-group">
                        <label>이메일</label>
                        <input type="email" id="reg-email" required placeholder="example@email.com">
                    </div>
                    <div class="form-group">
                        <label>비밀번호</label>
                        <input type="password" id="reg-pw" required placeholder="6자 이상의 비밀번호">
                    </div>
                    <button type="submit" class="btn-cert" style="width: 100%; padding: 15px; margin-top: 20px;">회원가입 완료</button>
                </form>
                <div class="auth-links">
                    이미 회원이신가요? <a href="login.html">로그인</a>
                </div>
            </div>
        </section>
    </main>

    <main-footer></main-footer>
    <script src="main.js" type="module"></script>
</body>
</html>
