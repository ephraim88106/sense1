          <h2>에티오피아 (Ethiopia)</h2>
          <p>커피의 발상지로 불리는 에티오피아는 세계에서 가장 다양한 커피 유전자를 보유하고 있습니다. 예가체프(Yirgacheffe), 시다모(Sidamo), 구지(Guji) 등 대표 생산지에서 재배되며, 내추럴(Natural) 가공 비율이 높은 것이 특징입니다.</p>

          <table class="info-table">
            <thead>

              <tr><td><strong>바디</strong></td><td>가벼움~중간</td><td>중간</td><td>묵직함</td></tr>

          <p>전 세계 커피 생산량의 대부분을 차지하는 두 품종, 아라비카(Arabica)와 로부스타(Robusta)는 어떤 차이가 있을까요? 단순히 맛의 차이를 넘어 재배 환경, 화학적 성분, 활용 분야까지 상세히 파헤쳐 봅니다.</p>

          <h2>기원과 재배 환경</h2>
          <p><strong>아라비카(Coffea arabica)</strong>는 에티오피아 고원이 원산지로, 해발 800~2,000m의 고지대에서 재배됩니다. 서늘한 기후와 풍부한 강수량을 필요로 하며, 병충해에 취약한 편입니다.</p>
          <p><strong>로부스타(Coffea canephora)</strong>는 아프리카 콩고 분지 원산으로, 해발 0~800m의 저지대에서도 잘 자랍니다. 고온 다습한 환경에 강하고, 병충해 저항력이 뛰어납니다.</p>

          <h2>화학 성분 비교</h2>
          <table class="info-table">

              <tr><th>성분</th><th>아라비카</th><th>로부스타</th></tr>
            </thead>

              <tr><td><strong>당류</strong></td><td>6~9%</td><td>3~7%</td></tr>
              <tr><td><strong>지질(오일)</strong></td><td>15~17%</td><td>10~11.5%</td></tr>
              <tr><td><strong>클로로겐산</strong></td><td>5.5~8%</td><td>7~10% (쓴맛 원인)</td></tr>
            </tbody>
          </table>
          <p>로부스타의 높은 카페인 함량은 자연적인 병충해 방어 수단이 됩니다. 반면 아라비카는 당류와 지질이 풍부해 복합적인 향미를 만들어냅니다.</p>

          <h2>향미 특성</h2>
          <ul>
            <li><strong>아라비카:</strong> 밝은 산미, 풍부한 향기(꽃·과일·견과류), 부드러운 바디감. 스페셜티 커피의 주력 품종</li>

          <h2>활용 분야</h2>
          <p>아라비카는 싱글 오리진, 드립 커피, 스페셜티 등 프리미엄 시장에서 주로 소비됩니다. 로부스타는 인스턴트 커피, 에스프레소 블렌드(크레마 강화용), 가공 식품 등에 널리 활용됩니다.</p>
          <p>최근에는 파인 로부스타(Fine Robusta)라는 고급 로부스타 시장도 형성되어, 품종 간 경계가 점차 흐려지는 추세입니다.</p>

          <div class="exam-tip">시험 포인트: 아라비카(고지대·산미·향기·카페인 적음) vs 로부스타(저지대·카페인 2배·바디감·크레마)를 명확히 구분하세요. 카페인 함량 수치까지 출제됩니다.</div>

      {
        id: 2, emoji: "🔥", category: "로스팅",
        title: "로스팅의 마법: 생두가 원두가 되는 과정",
        date: "2024.01.20",
        body: `
          <p>생두(Green Bean)에 열을 가하여 커피 고유의 맛과 향을 끌어내는 로스팅(Roasting)은 커피의 운명을 결정짓는 가장 중요한 공정입니다. 단계에 따라 극적으로 변화하는 물리적·화학적 성질을 알아봅니다.</p>

          <h2>로스팅의 3단계</h2>

          <h2>1단계: 건조 (Drying Phase)</h2>
          <p>투입 직후부터 약 150°C까지의 구간입니다. 생두 내부의 수분(10~12%)이 서서히 증발하며, 연한 초록색에서 노란색으로 변합니다. 이 단계에서 풋내(Grassy aroma)가 나며, 전체 로스팅 시간의 약 40~50%를 차지합니다.</p>

          <h2>2단계: 마이야르 반응 & 캐러멜화 (Browning Phase)</h2>
          <p>약 150~200°C 구간에서 마이야르 반응(Maillard Reaction)이 본격 시작됩니다. 아미노산과 환원당이 반응하여 멜라노이딘(갈색 색소)과 수백 가지 향미 화합물이 생성됩니다.</p>
          <ul>
            <li><strong>마이야르 반응:</strong> 캐러멜, 견과류, 빵 굽는 향 등 복합적인 풍미 형성</li>
            <li><strong>캐러멜화:</strong> 당류가 분해되어 달콤한 향과 갈색으로의 색 변화 유도</li>
            <li><strong>스트레커 분해:</strong> 아미노산이 분해되며 알데히드 계열 향 화합물 생성</li>
          </ul>

          <h2>3단계: 1차 크랙 이후 (Development Phase)</h2>
          <p>약 196~205°C에서 '팝' 또는 '탁' 하는 소리와 함께 <strong>1차 크랙(First Crack)</strong>이 발생합니다. 내부 수증기 압력이 세포벽을 파열시키는 현상으로, 이 시점부터 본격적인 '커피다운' 향미가 나타납니다.</p>
          <p>약 224°C 이상에서는 <strong>2차 크랙(Second Crack)</strong>이 발생하며, 오일이 표면으로 분출됩니다. 이 이후는 다크 로스트 영역입니다.</p>

          <h2>배전도별 특징</h2>
          <table class="info-table">
            <thead>
              <tr><th>배전도</th><th>온도 범위</th><th>특징</th><th>대표 향미</th></tr>
            </thead>
            <tbody>

              <tr><td><strong>미디엄</strong></td><td>210~220°C</td><td>산미와 바디의 균형</td><td>캐러멜, 견과류, 초콜릿</td></tr>
              <tr><td><strong>다크</strong></td><td>225°C 이상</td><td>2차 크랙 이후, 오일 표면 분출</td><td>스모키, 쓴맛, 묵직한 바디</td></tr>
            </tbody>
          </table>

          <p>배전도가 높아질수록 산미는 줄고 쓴맛·바디감이 증가합니다. 반대로 라이트 로스트는 산지 고유의 향미(테루아)를 가장 잘 표현합니다.</p>

        `

      {

        title: "에스프레소 추출의 4대 요소",
        date: "2024.01.25",
        body: `
          <p>완벽한 한 잔의 에스프레소를 위해 바리스타가 반드시 이해하고 조절해야 할 4가지 핵심 변수가 있습니다. 이 요소들은 서로 밀접하게 연결되어 있으며, 하나를 바꾸면 나머지에도 영향을 미칩니다.</p>

          <h2>1. 분쇄도 (Grinding Size)</h2>
          <p>원두를 얼마나 곱게 또는 굵게 갈 것인지를 결정합니다. 에스프레소는 다른 추출 방식보다 훨씬 고운 분쇄를 필요로 합니다.</p>
          <ul>
            <li><strong>너무 곱게 갈 경우:</strong> 물이 커피 층을 통과하기 어려워 추출 시간이 길어지고, 과다추출(Over-extraction)이 발생합니다. 쓴맛과 떫은 맛이 강해집니다.</li>
            <li><strong>너무 굵게 갈 경우:</strong> 물이 빠르게 통과하여 추출 시간이 짧아지고, 과소추출(Under-extraction)이 됩니다. 신맛과 밍밍한 맛이 납니다.</li>
            <li><strong>적정 기준:</strong> 백설탕과 소금 사이의 입자 크기, 손으로 비볐을 때 뭉치지 않고 흩어지는 정도</li>
          </ul>

          <h2>2. 도징 (Dosing)</h2>
          <p>포터필터 바스켓에 담는 원두의 양을 말합니다. 도징량은 추출 농도와 맛의 밸런스에 직접적인 영향을 줍니다.</p>
          <ul>
            <li><strong>싱글 바스켓:</strong> 7~10g</li>
            <li><strong>더블 바스켓:</strong> 14~20g (가장 일반적)</li>
            <li><strong>브루잉 비율(Brew Ratio):</strong> 도징량 대비 추출량의 비율. 예: 18g 투입 → 36g 추출 = 1:2 비율</li>
          </ul>
          <p>도징량을 일정하게 유지하는 것이 재현성 있는 추출의 첫 번째 조건입니다. 전자저울 사용이 필수입니다.</p>

          <h2>3. 레벨링 & 탬핑 (Leveling & Tamping)</h2>
          <p>바스켓에 담긴 커피 가루의 밀도를 균일하게 만드는 과정입니다. 불균일하면 물이 약한 부분으로 편향되는 <strong>채널링(Channeling)</strong> 현상이 발생합니다.</p>
          <ul>
            <li><strong>레벨링(Distribution):</strong> 탬핑 전 커피 가루를 고르게 분배. WDT(Weiss Distribution Technique) 도구나 손가락으로 수행</li>
            <li><strong>탬핑 압력:</strong> 약 15~20kg의 일정한 수직 압력. 중요한 것은 압력의 세기보다 수평·균일성</li>
            <li><strong>폴리시(Polish):</strong> 탬핑 후 표면을 가볍게 회전시켜 마무리</li>
          </ul>

          <h2>4. 추출 시간 (Extraction Time)</h2>
          <p>펌프 작동부터 에스프레소가 추출 완료되기까지의 시간을 말합니다.</p>
          <table class="info-table">
            <thead>
              <tr><th>추출 상태</th><th>시간</th><th>맛 특성</th><th>원인</th></tr>
            </thead>
            <tbody>
              <tr><td><strong>과소추출</strong></td><td>20초 미만</td><td>신맛, 밍밍함, 얇은 바디</td><td>분쇄 너무 굵음, 도징 부족</td></tr>
              <tr><td><strong>적정 추출</strong></td><td>25~30초</td><td>단맛·산미·쓴맛 균형, 풍부한 크레마</td><td>모든 변수 최적화</td></tr>
              <tr><td><strong>과다추출</strong></td><td>35초 이상</td><td>쓴맛, 떫은 맛, 탄 느낌</td><td>분쇄 너무 곱음, 도징 과다</td></tr>
            </tbody>
          </table>

          <h2>4요소의 상호 관계</h2>
          <p>이 4가지 요소는 독립적이지 않고 서로 맞물려 있습니다. 예를 들어:</p>
          <ul>
            <li>분쇄도를 곱게 하면 → 추출 시간이 길어짐 → 도징량을 줄이거나 탬핑 압력을 낮춰 보정</li>
            <li>도징량을 늘리면 → 추출 저항 증가 → 분쇄도를 약간 굵게 조절</li>
          </ul>
          <p>올바른 세팅 방법은 <strong>기준점을 먼저 정하고, 한 번에 하나의 변수만 조절</strong>하는 것입니다. 여러 변수를 동시에 바꾸면 원인 파악이 불가능해집니다.</p>

          <div class="exam-tip">시험 포인트: 분쇄도·도징·탬핑·추출시간 4요소와 각 적정 수치(더블 14~20g, 15~20kg 압력, 25~30초)를 반드시 암기하세요. 과소/과다 추출 원인 연결도 필수입니다.</div>
        `
      }
    ];

    const params = new URLSearchParams(location.search);
    const id = parseInt(params.get('id'));
    const article = articles.find(a => a.id === id);
    const container = document.getElementById('content');

    if (!article) {
      container.innerHTML = '<p style="color:#94a3b8;text-align:center;padding:60px 0">글을 찾을 수 없습니다.</p>';
    } else {
      document.title = article.title + ' | 센스원';
      container.innerHTML = `
        <div class="category-badge">${article.emoji} ${article.category}</div>
        <h1 class="article-title">${article.title}</h1>
        <div class="article-meta">${article.date}</div>
        <div class="article-body">${article.body}</div>
      `;
    }
  </script>
