  <script type="module">
    import { knowledgeArticles } from './knowledge-data.js';
    const container = document.getElementById('knowledge-cards');
    if (container) {
      container.innerHTML = knowledgeArticles.map(a => `
        <a href="${a.link || 'knowledge-article.html?id=' + a.id}" style="text-decoration:none;color:inherit;">

            <div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;">
              <span style="font-size:2rem;">${a.emoji}</span>
              <div>
                <span style="font-size:0.72rem;background:${a.categoryColor.bg};color:${a.categoryColor.text};padding:2px 8px;border-radius:10px;font-weight:700;">${a.category}</span>
                <h3 style="margin:6px 0 4px;font-size:1rem;">${a.title}</h3>
                <p style="color:var(--text-muted);font-size:0.8rem;">${a.date}</p>
              </div>
            </div>
            <p style="font-size:0.9rem;color:var(--text-muted);line-height:1.6;flex:1;">${a.summary}</p>
            <div style="margin-top:14px;color:#0ea5e9;font-size:0.85rem;font-weight:600;">자세히 보기 &rarr;</div>
